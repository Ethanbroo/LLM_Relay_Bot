<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini App Test</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body style="font-family: sans-serif; padding: 20px; background: #f5f5f5;">
<h1 style="color: green;">Mini App Loaded</h1>
<div id="info" style="background: white; padding: 16px; border-radius: 8px; margin-top: 16px;"></div>
<script>
var info = document.getElementById('info');
var lines = [];
lines.push('Page loaded: YES');
lines.push('Time: ' + new Date().toISOString());
lines.push('User Agent: ' + navigator.userAgent);

if (window.Telegram && window.Telegram.WebApp) {
  var tg = window.Telegram.WebApp;
  lines.push('Telegram SDK: LOADED');
  lines.push('Platform: ' + tg.platform);
  lines.push('Version: ' + tg.version);
  lines.push('initData length: ' + (tg.initData || '').length);
  tg.ready();
  tg.expand();
  lines.push('tg.ready() called: YES');
} else {
  lines.push('Telegram SDK: NOT AVAILABLE');
}

info.innerHTML = lines.map(function(l) { return '<p style="margin:4px 0">' + l + '</p>'; }).join('');
</script>
</body>
</html>
