# Nginx config for Cloudflare-proxied setup
# Cloudflare handles TLS termination — nginx only receives HTTP from Cloudflare.
# No Let's Encrypt / certbot needed.

# ── Main server (HTTP only — Cloudflare terminates TLS) ───────
server {
    listen 80;
    server_name relay.friendlyconnections.services *.relay.friendlyconnections.services;

    # Verify requests come from Cloudflare (optional but recommended)
    # Cloudflare IP ranges: https://www.cloudflare.com/ips/
    # Uncomment these once confirmed working:
    # allow 173.245.48.0/20;
    # allow 103.21.244.0/22;
    # allow 103.22.200.0/22;
    # allow 103.31.4.0/22;
    # allow 141.101.64.0/18;
    # allow 108.162.192.0/18;
    # allow 190.93.240.0/20;
    # allow 188.114.96.0/20;
    # allow 197.234.240.0/22;
    # allow 198.41.128.0/17;
    # allow 162.158.0.0/15;
    # allow 104.16.0.0/13;
    # allow 104.24.0.0/14;
    # allow 172.64.0.0/13;
    # allow 131.0.72.0/22;
    # IPv6
    # allow 2400:cb00::/32;
    # allow 2606:4700::/32;
    # allow 2803:f800::/32;
    # allow 2405:b500::/32;
    # allow 2405:8100::/32;
    # allow 2a06:98c0::/29;
    # allow 2c0f:f248::/32;
    # deny all;

    # Health check for Docker healthcheck
    location /health { return 200 'ok'; }

    # ── Telegram webhook ─────────────────────────────────────
    # With Cloudflare proxy, source IP is Cloudflare, not Telegram.
    # The bot still validates via X-Telegram-Bot-Api-Secret-Token header.
    location /webhook/ {
        limit_req zone=webhook_limit burst=5 nodelay;
        set $bot_upstream http://relay-bot:8000;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── code-server (WebSocket required) ─────────────────────
    location = /code { return 302 /code/$is_args$args; }

    location /code/ {
        limit_req zone=code_limit burst=30 nodelay;
        set $code_upstream http://code-server:8443;
        proxy_pass $code_upstream/;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding gzip;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Mini App static files ──────────────────────────────
    location /webapp/ {
        set $bot_upstream http://relay-bot:8000;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Mini App API ───────────────────────────────────────
    location /api/ {
        limit_req zone=webhook_limit burst=10 nodelay;
        set $bot_upstream http://relay-bot:8000;
        proxy_pass $bot_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Everything else → 404
    location / {
        limit_req zone=general burst=20 nodelay;
        return 404;
    }
}
