user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    server_tokens off;          # Hides "nginx/1.27" from response headers
    client_max_body_size 50m;   # Telegram can send files up to 50MB

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # WebSocket upgrade map — required for code-server
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=webhook_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=code_limit:10m rate=20r/s;

    resolver 127.0.0.11 valid=10s;   # Docker embedded DNS

    include /etc/nginx/conf.d/*.conf;
}
